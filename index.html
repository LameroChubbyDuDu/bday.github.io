<html>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap');
        body{
            background-image: url("img/bg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slot-machine-base{
            position: relative;
            align-items: center;
            background-color: rgb(239, 187, 44);

            width: 50vw;
            height: 30vw;

            font-family: "Changa One", sans-serif;
            text-align: center;
            color: rgb(133, 42, 9);
            font-size: 35px;

            border: dotted 5px rgb(133, 42, 9);
        }

        .slot-machine-triggered{
            position: relative;
            align-items: center;
            background-color: rgb(235, 141, 249);

            width: 50vw;
            height: 30vw;

            font-family: "Changa One", sans-serif;
            text-align: center;
            color: rgb(133, 42, 9);
            font-size: 35px;

            border: dotted 5px rgb(133, 42, 9);
        }

        .nameTag{
            position: fixed;
            background-image: url("img/name-tag.png");
            background-repeat: no-repeat;
            background-size: contain;

            top: calc(100vh - 267px); 
            left: calc(100vw - 267px);
            width: 267px;
            height: 267px;
            z-index: 10;
        }

        .dragging{
            cursor: grab;
        }

        .loadingEffect{
            position: fixed;
            background-image: url("img/loading.png");
            height: 500px;
            width: 500px;
            z-index: 999;
            animation: loadingAnimation 1s linear infinite;
        }

        .Treasure{
            font-family: "Changa One", sans-serif;

            display: flex;
            flex-direction: column;
            text-align: center;
            align-items: center;
            justify-content: center;
            width:100%;
        }

         .treasureNote{
            font-family: "Changa One", sans-serif;

            display: flex;
            text-align: center;
            align-items: center;
            justify-content: center;

            color: rgb(235, 141, 249);
            font-size: 25px;
        }

        .treasureInput{
            text-align: center;
            align-items: center;
            justify-content: center;
        }

        #num-1, #num-2, #num-3{
            width: 50px;
            height: 50px;
            font-size: 30px;
            text-align: center;
            z-index: 999;

            color:rgb(255, 183, 48);
            font-family: "Changa One", sans-serif;
            border-radius: 50%;
        }

        .treasureButton{
            margin-top: 25px;
            width: 100px;
            height: 50px;
            font-size: 20px;
            border-radius: 60%;
            font-family: "Changa One", sans-serif;
            color: rgb(255, 157, 240);
            border: none;

            text-align: center;
            align-items: center;
            justify-content: center;
        }

        .treasureButton:hover{
            background-color: rgb(255, 157, 240);
            color: rgb(255, 255, 255);
        }

        @keyframes loadingAnimation {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
            100% { transform: rotate(-360deg); }
        }
        
    </style>
    <body>
        <div class="slot-machine-base">Drag your name tag here...</div>
        <div class="slot-machine-triggered" style="display:none">Name tag detected!</div>
        <div class="nameTag" draggable="true"></div>
        <div class="loadingEffect" style="display:none"></div>
        <div class="Treasure" style="display:none">
            <h4 class="treasureNote">Please enter the key number to proceed.</h4>
            <div class="treasureInput">
                <input type="text" placeholder="" id="num-1">
                <input type="text" placeholder="" id="num-2">
                <input type="text" placeholder="" id="num-3">
            </div>
            <input type="button" value="Submit" class="treasureButton">
        </div>
    </body>
    <script>
        const nameTag = document.getElementsByClassName("nameTag")[0];
        const slotMachineBase = document.getElementsByClassName("slot-machine-base")[0];
        const slotMachineTriggered = document.getElementsByClassName("slot-machine-triggered")[0];
        const loadingEffect = document.getElementsByClassName("loadingEffect")[0];
        const Treasure = document.getElementsByClassName("Treasure")[0];
        const num1 = document.getElementById("num-1");
        const num2 = document.getElementById("num-2");
        const num3 = document.getElementById("num-3");
        const submitButton = document.getElementsByClassName("treasureButton")[0];
        const treasureNote = document.getElementsByClassName("treasureNote")[0];

        let x = 0;
        let y = 0;

        nameTag.addEventListener("drag", (event) => {
            event.target.classList.add('dragging');
        });
        slotMachineBase.addEventListener("dragover", (event) => {
            event.preventDefault();
            // nameTag.setAttribute("position", "absolute");
              
        });
        slotMachineBase.addEventListener("drop", (event) => {
            event.preventDefault();
            slotMachineBase.setAttribute("style", "display:none");
            slotMachineTriggered.setAttribute("style", "display:''");

            nameTag.style.left = event.clientX-133;
            nameTag.style.top = event.clientY-133;
            nameTag.classList.remove('dragging');
            nameTag.draggable = false;

            setTimeout(() => {
                slotMachineTriggered.setAttribute("style", "display:none");
                nameTag.setAttribute("style", "display:none");
                loadingEffect.setAttribute("style", "display:''");
                setTimeout(() => {
                    loadingEffect.setAttribute("style", "display:none");
                    Treasure.setAttribute("style", "display:''");
                }, 1000);
            }, 1500);
        });
        submitButton.addEventListener("click", () => {
            if(num1.value === "1" && num2.value === "2" && num3.value === "3"){
                // alert("Congratulations! You've unlocked the treasure!");
                window.location.replace("letter.html");
            } else {
                treasureNote.textContent = "Wrong Number";
                treasureNote.style.color = "rgb(255, 51, 48)";
                setTimeout(()=>{
                    treasureNote.textContent = "Please enter the key number to proceed.";
                    treasureNote.style.color = "rgb(235, 141, 249)";

                    num1.value = '';
                    num2.value = '';
                    num3.value = '';
                }, 800);

                
                
            }
        });

        
    </script>
</html>
